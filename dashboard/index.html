<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>17BA Progress Tree</title>
<style>
  :root{
    --bg:#f6f7f3; --ink:#3a3f48; --mut:#9aa0aa; --faint:#e7e9e2; --line:#c8ccc0;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:var(--bg); color:var(--ink);
    font-family:"Segoe UI",Helvetica,Arial,sans-serif; overflow:hidden;
  }
  header{
    position:fixed; top:0; left:0; right:0; height:58px; z-index:5;
    display:flex; align-items:center; gap:18px; padding:0 24px;
  }
  header .title{font-size:18px; font-weight:800; letter-spacing:2px; color:#b8442f}
  header .sub{font-size:11.5px; color:var(--mut); letter-spacing:1px; margin-top:1px}
  header .spacer{flex:1}
  .chips{display:flex; gap:8px}
  .chip{
    font-size:12px; color:var(--mut); border:1px solid var(--line);
    background:#fff; padding:6px 13px; border-radius:20px; cursor:pointer;
    user-select:none; transition:.15s;
  }
  .chip:hover{color:var(--ink)}
  .chip.on{color:#fff; border-color:#b8442f; background:#b8442f}
  #stage{position:absolute; inset:0}
  svg{width:100%; height:100%; display:block}
  .branch{transition:opacity .18s; cursor:pointer}
  .pin,.opt{cursor:pointer}
  .pin-num{font-weight:800; fill:#fff}
  .ttl{font-weight:800; letter-spacing:.5px}
  .blurb{fill:var(--mut)}
  .pname{fill:#4a4f58; font-weight:600}
  .leaf{fill:#aeb4bc}
  .dim{opacity:.16}
  .pulse{transform-box:fill-box; transform-origin:center; animation:pp 1.6s ease-in-out infinite}
  @keyframes pp{0%,100%{opacity:.25}50%{opacity:.9}}
  /* side panel */
  #panel{
    position:fixed; top:0; right:0; width:330px; bottom:0; z-index:8;
    background:#fff; border-left:1px solid var(--faint); box-shadow:-12px 0 40px rgba(0,0,0,.06);
    transform:translateX(100%); transition:.22s ease; padding:24px; overflow:auto;
  }
  #panel.open{transform:none}
  #panel .pclose{position:absolute; top:16px; right:18px; color:var(--mut); cursor:pointer; font-size:18px}
  #panel h2{margin:6px 0 2px; font-size:21px; color:#2b2f37}
  #panel .pp-pillar{font-size:11px; font-weight:800; letter-spacing:1.5px}
  #panel .row{display:flex; gap:8px; align-items:center; margin:14px 0 0; font-size:13px; color:var(--mut)}
  #panel .row b{color:var(--ink); font-weight:600}
  #panel .stat{display:inline-flex; align-items:center; gap:7px; font-size:12.5px; padding:5px 12px; border-radius:20px; margin-top:12px; font-weight:600}
  #panel .files{margin-top:8px}
  #panel .files .f{display:flex; align-items:center; gap:8px; font-size:12.5px; color:#5a606c; padding:7px 0; border-bottom:1px solid #f0f1ec}
  #panel .nextnote{margin-top:18px; padding:12px 14px; border-radius:10px; background:#f0faf2; border:1px solid #cfe9d6; color:#2f8a4e; font-size:12.5px}
  #panel .empty{margin-top:8px; color:#bcc1c8; font-size:12.5px; font-style:italic}
</style>
</head>
<body>
<header>
  <div>
    <div class="title">17BA PROGRESS TREE</div>
    <div class="sub" id="subline">BAD APPLE ENTERPRISE</div>
  </div>
  <div class="spacer"></div>
  <div class="chips">
    <div class="chip on" data-f="all">All</div>
    <div class="chip" data-f="next">Next steps</div>
    <div class="chip" data-f="done">Done</div>
    <div class="chip" data-f="active">Active</div>
  </div>
</header>

<div id="stage"></div>

<div id="panel">
  <div class="pclose" onclick="closePanel()">✕</div>
  <div id="panelBody"></div>
</div>

<script>
/* ════════════════════════════════════════════════════════════════════
   DATA — single source of truth. Claude maintains it each session.
   status: done | active | draft | idea     (next:true = grow this next)
   ════════════════════════════════════════════════════════════════════ */
const DATA = {
  core: { name:"17BA", sub:"BAD APPLE ENTERPRISE" },
  roots: ["17BA_Chakka.mq5","17BA_Kwasheba.mq5","agent-office/","README.md"],
  pillars: [
    { n:1, name:"Trading Engine", color:"#2fa45a", side:"L", icon:"chart",
      blurb:"MQL5 expert advisors — the engine room.",
      projects:[
        { name:"Chakka Bot",   agent:"Reality Checker", status:"done",   files:["17BA_Chakka.mq5"] },
        { name:"Kwasheba Bot", agent:"Code Reviewer",   status:"active", files:["17BA_Kwasheba.mq5"], next:true,
          note:"Certify it like Chakka: balance check, verify safety fixes, compile clean." },
        { name:"Bot #3",       agent:"—",               status:"idea",   files:[] }
      ] },
    { n:2, name:"Agent Infrastructure", color:"#1f9bb3", side:"R", icon:"bot",
      blurb:"The agents and tools that run the shop.",
      projects:[
        { name:"Agent Office",    agent:"MCP Builder",        status:"done",   files:["server.py","index.html"] },
        { name:"This Dashboard",  agent:"Frontend Developer", status:"active", files:["dashboard/index.html"] },
        { name:"Agent Overwatch", agent:"SRE",                status:"draft",  files:["overwatch.py"] }
      ] },
    { n:3, name:"Brand & Content", color:"#e08529", side:"L", icon:"brand",
      blurb:"How 17BA looks, sounds, and sells.",
      projects:[
        { name:"Brand",          agent:"Brand Guardian", status:"draft", files:["brand/guide.md"] },
        { name:"Bot Sales Page", agent:"Growth Hacker",  status:"draft", files:["sales.html"] }
      ] },
    { n:4, name:"The Academy", color:"#8b46d4", side:"R", icon:"cap",
      blurb:"Teaching what we build.",
      projects:[
        { name:"The Academy", agent:"Training Designer", status:"idea", files:[] }
      ] },
    { n:5, name:"The Collections", color:"#d6a312", side:"L", icon:"box",
      blurb:"Products and drops.",
      projects:[
        { name:"Collection #1", agent:"—", status:"idea", files:[] }
      ] },
    { n:6, name:"Corefuel", color:"#d83a3a", side:"R", icon:"fuel",
      blurb:"The financial backbone.",
      projects:[
        { name:"Fuel Source", agent:"—", status:"idea", files:[] }
      ] }
  ]
};

const STATUS = { done:"#2fa45a", active:"#e0a01f", draft:"#aeb4bc", idea:"#5b8def", next:"#e0a01f" };
const STATUS_LABEL = { done:"Done / Live", active:"Active", draft:"Draft", idea:"Idea" };

const ICONS = {
  chart:"M4 19h16M6 16l3-4 3 2 4-7",
  bot:  "M9 4h6M12 4v3M6 7h12v9H6zM9 11h.01M15 11h.01M9 19h6",
  brand:"M12 3l2.5 5 5.5.5-4 4 1 5.5L12 20l-5 2.5 1-5.5-4-4 5.5-.5z",
  cap:  "M3 9l9-4 9 4-9 4-9-4zM7 11v4c0 1 2.5 2.5 5 2.5s5-1.5 5-2.5v-4",
  box:  "M3 7l9-4 9 4v10l-9 4-9-4zM3 7l9 4 9-4M12 11v10",
  fuel: "M5 21V5a2 2 0 012-2h6a2 2 0 012 2v16M5 12h10M17 8l3 3v6a2 2 0 01-4 0"
};

const W=1440, H=940, cx=720, baseY=842, trunkTop=120;
const PINX = { L:600, R:840 };
const SLOTS = [648, 432, 208];   // index 0 = lowest (n smallest); grows upward

function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function projColor(p){ return p.next ? STATUS.active : (STATUS[p.status]||STATUS.draft); }

function layout(){
  const byside={L:[],R:[]};
  DATA.pillars.slice().sort((a,b)=>a.n-b.n).forEach(p=>byside[p.side].push(p));
  const place=[];
  for(const side of ["L","R"]){
    byside[side].forEach((p,i)=>place.push({p, x:PINX[side], y:SLOTS[Math.min(i,SLOTS.length-1)], side}));
  }
  return place;
}
function curve(x1,y1,x2,y2){
  const mx=(x1+x2)/2;
  return `M ${x1} ${y1} C ${mx} ${y1} ${mx} ${y2} ${x2} ${y2}`;
}
function vcurve(x1,y1,x2,y2){
  const my=(y1+y2)/2;
  return `M ${x1} ${y1} C ${x1} ${my} ${x2} ${my} ${x2} ${y2}`;
}
/* organic limb: leaves the trunk going straight UP, then bends OUT to the pin
   (vertical tangent at the trunk, horizontal tangent at the pin) */
function elbow(x0,y0,x1,y1){
  const ymid=y0+(y1-y0)*0.52;
  const xmid=x0+(x1-x0)*0.60;
  return `M ${x0} ${y0} C ${x0} ${ymid} ${xmid} ${y1} ${x1} ${y1}`;
}

function matchFilter(pr,f){ if(f==="all")return true; if(f==="next")return !!pr.next; return pr.status===f; }

function buildSVG(filter){
  filter=filter||"all";
  const place=layout();
  const S=[];
  S.push(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">`);
  S.push(`<defs>
    <pattern id="hatch" width="22" height="22" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="22" stroke="#ecede8" stroke-width="1"/>
    </pattern>
  </defs>`);
  S.push(`<rect width="${W}" height="${H}" fill="#f6f7f3"/>`);
  S.push(`<rect width="${W}" height="${H}" fill="url(#hatch)"/>`);

  // ── trunk: slim tapered line-art ──
  S.push(`<path d="${vcurve(cx-7,baseY,cx-3,trunkTop)} L ${cx+3} ${trunkTop} ${vcurve(cx+3,trunkTop,cx+7,baseY).replace('M','L')} Z" fill="#eceee7" stroke="#cfd3c8" stroke-width="1.5"/>`);
  S.push(`<line x1="${cx}" y1="${baseY-20}" x2="${cx}" y2="${trunkTop+10}" stroke="#dadcd3" stroke-width="1"/>`);

  // ── roots fanning out at the base ──
  const rn=DATA.roots.length;
  DATA.roots.forEach((r,i)=>{
    const dir=(i-(rn-1)/2);
    const rx=cx+dir*165, ry=baseY+60;
    S.push(`<path d="${vcurve(cx, baseY+4, rx, ry)}" stroke="#cdd1c6" stroke-width="1.6" fill="none"/>`);
    S.push(`<circle cx="${rx}" cy="${ry}" r="4" fill="#fff" stroke="#c4c9bd" stroke-width="1.5"/>`);
    S.push(`<text x="${rx}" y="${ry+17}" text-anchor="middle" class="leaf" font-size="10">${esc(r)}</text>`);
  });

  // ── branches + pins (organic: rise off the trunk, then bend out) ──
  place.forEach((pl,idx)=>{
    const p=pl.p, col=p.color;
    const ax=cx+(pl.side==="L"?-6:6);
    const attachY=Math.min(pl.y+150, baseY-26);     // limb starts well below its pin → visible rise
    const visible=p.projects.some(pr=>matchFilter(pr,filter));
    const outer=pl.side==="L"?-1:1;
    const anchor=pl.side==="L"?"end":"start";
    const leadEnd=pl.x+outer*170;                    // horizontal lead line runs out to the title

    // limb: straight up off the trunk, then a rounded bend out to the pin
    S.push(`<path class="branch${visible?"":" dim"}" data-i="${idx}" d="${elbow(ax,attachY,pl.x,pl.y)}" stroke="${col}" stroke-width="2.4" fill="none" stroke-linecap="round"/>`);
    // lead line out to the title
    S.push(`<path class="branch${visible?"":" dim"}" data-i="${idx}" d="M ${pl.x} ${pl.y} L ${leadEnd} ${pl.y}" stroke="${col}" stroke-width="2.4" fill="none" stroke-linecap="round"/>`);

    // option sub-nodes (projects) — small curved stubs hanging off the limb/lead, fanning out & down
    p.projects.forEach((pr,j)=>{
      const sx=pl.x+outer*(34+j*52);                 // where the stub leaves the lead line
      const oy=pl.y+38+j*30;                          // each option a little lower
      const pcol=projColor(pr);
      const vis=matchFilter(pr,filter);
      const g=vis?"":' class="dim"';
      S.push(`<path${g} d="${vcurve(sx, pl.y+3, sx, oy)}" stroke="${col}" stroke-width="1.3" stroke-opacity=".5" fill="none"/>`);
      S.push(`<g class="opt"${vis?"":' opacity=".16"'} data-i="${idx}" data-j="${j}">`);
      if(pr.next) S.push(`<circle class="pulse" cx="${sx}" cy="${oy}" r="9" fill="none" stroke="${STATUS.active}" stroke-width="2"/>`);
      S.push(`<circle cx="${sx}" cy="${oy}" r="5" fill="#fff" stroke="${pcol}" stroke-width="2.4"/>`);
      const lx=sx+outer*12;
      S.push(`<text x="${lx}" y="${oy-2}" text-anchor="${anchor}" class="pname" font-size="11.5">${esc(pr.name)}</text>`);
      const sub=pr.files.length?pr.files.join(", "):(pr.status==="idea"?"→ next step":"no files yet");
      S.push(`<text x="${lx}" y="${oy+11}" text-anchor="${anchor}" class="leaf" font-size="9.5">${esc(sub)}</text>`);
      S.push(`</g>`);
    });

    // title block at the end of the lead line (icon + colored caps + grey blurb)
    const tx=leadEnd+outer*14;
    S.push(`<g class="pin" data-i="${idx}"${visible?"":' opacity=".22"'}>`);
    const icoX=pl.side==="L"? tx-22 : tx;
    S.push(`<g transform="translate(${icoX},${pl.y-56}) scale(.9)" fill="none" stroke="${col}" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="${ICONS[p.icon]||ICONS.box}"/></g>`);
    S.push(`<text x="${tx}" y="${pl.y-24}" text-anchor="${anchor}" class="ttl" fill="${col}" font-size="15">${esc(p.name.toUpperCase())}</text>`);
    wrap(p.blurb, 30).forEach((ln,k)=>{
      S.push(`<text x="${tx}" y="${pl.y-7+k*13}" text-anchor="${anchor}" class="blurb" font-size="10.5">${esc(ln)}</text>`);
    });
    // map-pin marker at the bend
    S.push(pinMarker(pl.x, pl.y, col, p.n));
    S.push(`</g>`);
  });

  // ── base node (subtle target) + label ──
  S.push(`<circle cx="${cx}" cy="${baseY}" r="13" fill="#fff" stroke="#b8442f" stroke-width="2.5"/>`);
  S.push(`<circle cx="${cx}" cy="${baseY}" r="5" fill="#b8442f"/>`);
  S.push(`<text x="${cx}" y="${baseY+44}" text-anchor="middle" fill="#b8442f" font-size="15" font-weight="800" letter-spacing="1.5">${esc(DATA.core.name)}</text>`);

  S.push(`</svg>`);
  return S.join("");
}

/* a flat circular map-pin with a small downward point and centered number */
function pinMarker(x,y,col,num){
  const p=6;
  return `<g>`+
    `<path d="M ${x-13} ${y} A 13 13 0 1 1 ${x+13} ${y} L ${x+p} ${y} L ${x} ${y+13} L ${x-p} ${y} Z" fill="${col}"/>`+
    `<circle cx="${x}" cy="${y}" r="13" fill="${col}"/>`+
    `<circle cx="${x}" cy="${y}" r="13" fill="none" stroke="#fff" stroke-width="1.5"/>`+
    `<text x="${x}" y="${y+5}" text-anchor="middle" class="pin-num" font-size="14">${num}</text>`+
  `</g>`;
}

function wrap(s,max){
  const words=String(s).split(" "); const lines=[]; let cur="";
  for(const w of words){ if((cur+" "+w).trim().length>max){ lines.push(cur.trim()); cur=w; } else cur+=" "+w; }
  if(cur.trim()) lines.push(cur.trim());
  return lines.slice(0,2);
}

/* ── Node export for verification / browser init ── */
if (typeof module!=="undefined" && module.exports){ module.exports={buildSVG,DATA,layout}; }

if (typeof document!=="undefined"){
  let curFilter="all";
  function render(){
    document.getElementById("stage").innerHTML=buildSVG(curFilter);
    wire();
    const nx=DATA.pillars.flatMap(p=>p.projects).find(x=>x.next);
    document.getElementById("subline").textContent = nx?("NEXT STEP → "+nx.name.toUpperCase()):"BAD APPLE ENTERPRISE";
  }
  function wire(){
    document.querySelectorAll(".pin,.branch").forEach(el=>{
      el.addEventListener("click",()=>openPillar(+el.dataset.i));
      el.addEventListener("mouseenter",()=>highlight(+el.dataset.i));
      el.addEventListener("mouseleave",()=>render());
    });
    document.querySelectorAll(".opt").forEach(el=>{
      el.addEventListener("click",e=>{e.stopPropagation();openProject(+el.dataset.i,+el.dataset.j);});
    });
  }
  function highlight(i){ document.querySelectorAll(".branch").forEach(b=>{ if(+b.dataset.i!==i) b.classList.add("dim"); }); }
  function openPillar(i){
    const pil=layout()[i].p;
    let h=`<div class="pp-pillar" style="color:${pil.color}">PILLAR ${pil.n} · ${esc(pil.name.toUpperCase())}</div>`;
    h+=`<h2>${esc(pil.name)}</h2>`;
    h+=`<div class="row" style="margin-top:4px">${esc(pil.blurb)}</div>`;
    h+=`<div class="files" style="margin-top:14px">`;
    pil.projects.forEach(pr=>{
      h+=`<div class="f"><i style="width:9px;height:9px;border-radius:50%;display:inline-block;background:${projColor(pr)}"></i>`+
         `<b style="color:#3a3f48">${esc(pr.name)}</b> <span style="color:#aab">· ${esc(STATUS_LABEL[pr.status]||pr.status)}${pr.next?" · NEXT":""}</span></div>`;
    });
    h+=`</div>`; showPanel(h);
  }
  function openProject(i,j){
    const pil=layout()[i].p, pr=pil.projects[j];
    let h=`<div class="pp-pillar" style="color:${pil.color}">${esc(pil.name.toUpperCase())}</div>`;
    h+=`<h2>${esc(pr.name)}</h2>`;
    h+=`<div class="stat" style="background:${projColor(pr)}1a;color:${projColor(pr)}">`+
       `<span style="width:8px;height:8px;border-radius:50%;background:${projColor(pr)};display:inline-block"></span>`+
       `${esc(STATUS_LABEL[pr.status]||pr.status)}${pr.next?" · next step":""}</div>`;
    h+=`<div class="row">Agent: <b>${esc(pr.agent||"—")}</b></div>`;
    h+=`<div class="row" style="display:block">Files:`;
    if(pr.files.length) h+=`<div class="files">`+pr.files.map(f=>`<div class="f">📄 ${esc(f)}</div>`).join("")+`</div>`;
    else h+=`<div class="empty">No files yet — this branch hasn't sprouted.</div>`;
    h+=`</div>`;
    if(pr.note) h+=`<div class="nextnote"><b>Next step:</b> ${esc(pr.note)}</div>`;
    showPanel(h);
  }
  function showPanel(html){ document.getElementById("panelBody").innerHTML=html; document.getElementById("panel").classList.add("open"); }
  window.closePanel=()=>document.getElementById("panel").classList.remove("open");
  document.querySelectorAll(".chip").forEach(c=>c.addEventListener("click",()=>{
    document.querySelectorAll(".chip").forEach(x=>x.classList.remove("on"));
    c.classList.add("on"); curFilter=c.dataset.f; render();
  }));
  render();
}
</script>
</body>
</html>
