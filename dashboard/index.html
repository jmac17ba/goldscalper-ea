<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>17BA Nerve Map</title>
<style>
  :root{ --ink:#e8edf5; --mut:#8a93a3; --faint:#1a2230; --panel:#0d121b; }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:#070b11; color:var(--ink);
    font-family:"Segoe UI",Helvetica,Arial,sans-serif; overflow:hidden;
  }
  header{
    position:fixed; top:0; left:0; right:0; height:60px; z-index:5;
    display:flex; align-items:center; gap:18px; padding:0 24px;
    background:linear-gradient(180deg, rgba(7,11,17,.95), rgba(7,11,17,.4) 70%, transparent);
  }
  header .title{font-size:18px; font-weight:800; letter-spacing:3px; color:#3fd6e6}
  header .sub{font-size:11px; color:var(--mut); letter-spacing:2px; margin-top:2px}
  header .spacer{flex:1}
  .chips{display:flex; gap:8px}
  .chip{
    font-size:12px; color:var(--mut); border:1px solid #20303f;
    background:#0c131c; padding:6px 13px; border-radius:20px; cursor:pointer;
    user-select:none; transition:.15s;
  }
  .chip:hover{color:var(--ink)}
  .chip.on{color:#06222a; border-color:#3fd6e6; background:#3fd6e6}
  #stage{position:absolute; inset:0}
  svg{width:100%; height:100%; display:block}
  .branch{transition:opacity .18s; cursor:pointer}
  .opt{cursor:pointer}
  .pin-num{font-weight:800; fill:#06121a}
  .ttl{font-weight:800; letter-spacing:.5px}
  .blurb{fill:var(--mut)}
  .pname{fill:#cfd7e3; font-weight:600}
  .leaf{fill:#5e6a7a}
  .dim{opacity:.13}
  .pulse{transform-box:fill-box; transform-origin:center; animation:pp 1.5s ease-in-out infinite}
  @keyframes pp{0%,100%{opacity:.25; r:7}50%{opacity:1; r:11}}
  /* side panel */
  #panel{
    position:fixed; top:0; right:0; width:330px; bottom:0; z-index:8;
    background:linear-gradient(180deg,#0e141d,#0a0e15); border-left:1px solid #182232;
    transform:translateX(100%); transition:.22s ease; padding:24px; overflow:auto;
  }
  #panel.open{transform:none}
  #panel .pclose{position:absolute; top:16px; right:18px; color:var(--mut); cursor:pointer; font-size:18px}
  #panel h2{margin:6px 0 2px; font-size:21px; color:#f0f4fa}
  #panel .pp-pillar{font-size:11px; font-weight:800; letter-spacing:1.5px}
  #panel .row{display:flex; gap:8px; align-items:center; margin:14px 0 0; font-size:13px; color:var(--mut)}
  #panel .row b{color:var(--ink); font-weight:600}
  #panel .stat{display:inline-flex; align-items:center; gap:7px; font-size:12.5px; padding:5px 12px; border-radius:20px; margin-top:12px; font-weight:600}
  #panel .files{margin-top:8px}
  #panel .files .f{display:flex; align-items:center; gap:8px; font-size:12.5px; color:#aeb6c4; padding:7px 0; border-bottom:1px solid #141b26}
  #panel .nextnote{margin-top:18px; padding:12px 14px; border-radius:10px; background:#10241a; border:1px solid #1d4a30; color:#5fe39a; font-size:12.5px}
  #panel .empty{margin-top:8px; color:#4a5566; font-size:12.5px; font-style:italic}
</style>
</head>
<body>
<header>
  <div>
    <div class="title">17BA NERVE MAP</div>
    <div class="sub" id="subline">BAD APPLE ENTERPRISE · CENTRAL NERVOUS SYSTEM</div>
  </div>
  <div class="spacer"></div>
  <div class="chips">
    <div class="chip on" data-f="all">All</div>
    <div class="chip" data-f="next">Next steps</div>
    <div class="chip" data-f="done">Done</div>
    <div class="chip" data-f="active">Active</div>
  </div>
</header>

<div id="stage"></div>

<div id="panel">
  <div class="pclose" onclick="closePanel()">✕</div>
  <div id="panelBody"></div>
</div>

<script>
/* ════════════════════════════════════════════════════════════════════
   DATA — single source of truth. Claude maintains it each session.
   status: done | active | draft | idea     (next:true = fire this next)
   ════════════════════════════════════════════════════════════════════ */
const DATA = {
  core: { name:"17BA", sub:"BAD APPLE ENTERPRISE" },
  roots: ["17BA_Chakka.mq5","17BA_Kwasheba.mq5","agent-office/","README.md"],
  pillars: [
    { n:1, name:"Trading Engine", color:"#36d17f", side:"L", icon:"chart",
      blurb:"MQL5 expert advisors — the engine room.",
      projects:[
        { name:"Chakka Bot",   agent:"Reality Checker", status:"done",   files:["17BA_Chakka.mq5"] },
        { name:"Kwasheba Bot", agent:"Code Reviewer",   status:"done",   files:["17BA_Kwasheba.mq5"] },
        { name:"Bot #3",       agent:"—",               status:"idea",   files:[] }
      ] },
    { n:2, name:"Agent Infrastructure", color:"#28d3e8", side:"R", icon:"bot",
      blurb:"The agents and tools that run the shop.",
      projects:[
        { name:"Agent Office",    agent:"MCP Builder",        status:"done",   files:["server.py","index.html"] },
        { name:"This Dashboard",  agent:"Frontend Developer", status:"active", files:["dashboard/index.html"] },
        { name:"Agent Overwatch", agent:"SRE",                status:"draft",  files:["overwatch.py"] }
      ] },
    { n:3, name:"Brand & Content", color:"#ff9a3c", side:"L", icon:"brand",
      blurb:"How 17BA looks, sounds, and sells.",
      projects:[
        { name:"Brand",          agent:"Brand Guardian", status:"draft", files:["brand/guide.md"] },
        { name:"Bot Sales Page", agent:"Growth Hacker",  status:"draft", files:["sales.html"], next:true,
          note:"Educational landing page presenting Chakka + Kwasheba — strictly no profit promises." }
      ] },
    { n:4, name:"The Academy", color:"#b06bff", side:"R", icon:"cap",
      blurb:"Teaching what we build.",
      projects:[ { name:"The Academy", agent:"Training Designer", status:"idea", files:[] } ] },
    { n:5, name:"The Collections", color:"#ffc83a", side:"L", icon:"box",
      blurb:"Products and drops.",
      projects:[ { name:"Collection #1", agent:"—", status:"idea", files:[] } ] },
    { n:6, name:"Corefuel", color:"#ff5a5a", side:"R", icon:"fuel",
      blurb:"The financial backbone.",
      projects:[ { name:"Fuel Source", agent:"—", status:"idea", files:[] } ] }
  ]
};

const STATUS = { done:"#3ad17f", active:"#ffc24a", draft:"#7c8696", idea:"#5b9bff", next:"#ffc24a" };
const STATUS_LABEL = { done:"Done / Live", active:"Active", draft:"Draft", idea:"Idea" };
const CORD = "#36c5d6";

const ICONS = {
  chart:"M4 19h16M6 16l3-4 3 2 4-7",
  bot:  "M9 4h6M12 4v3M6 7h12v9H6zM9 11h.01M15 11h.01M9 19h6",
  brand:"M12 3l2.5 5 5.5.5-4 4 1 5.5L12 20l-5 2.5 1-5.5-4-4 5.5-.5z",
  cap:  "M3 9l9-4 9 4-9 4-9-4zM7 11v4c0 1 2.5 2.5 5 2.5s5-1.5 5-2.5v-4",
  box:  "M3 7l9-4 9 4v10l-9 4-9-4zM3 7l9 4 9-4M12 11v10",
  fuel: "M5 21V5a2 2 0 012-2h6a2 2 0 012 2v16M5 12h10M17 8l3 3v6a2 2 0 01-4 0"
};

const W=1440, H=940, cx=720, baseY=842, trunkTop=120;
const PINX = { L:600, R:840 };
const SLOTS = [648, 432, 208];

function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function projColor(p){ return p.next ? STATUS.active : (STATUS[p.status]||STATUS.draft); }

function layout(){
  const byside={L:[],R:[]};
  DATA.pillars.slice().sort((a,b)=>a.n-b.n).forEach(p=>byside[p.side].push(p));
  const place=[];
  for(const side of ["L","R"])
    byside[side].forEach((p,i)=>place.push({p, x:PINX[side], y:SLOTS[Math.min(i,SLOTS.length-1)], side}));
  return place;
}
/* wavy central nerve cord */
function spineX(y){ const t=(baseY-y)/(baseY-trunkTop); return cx + 16*Math.sin(t*Math.PI*1.7); }
function spinePath(){
  let d="M "+spineX(baseY).toFixed(1)+" "+baseY;
  for(let y=baseY; y>=trunkTop; y-=12) d+=" L "+spineX(y).toFixed(1)+" "+y;
  return d;
}
/* axon: rise off the cord, then bend out to the node */
function elbow(x0,y0,x1,y1){ const ym=y0+(y1-y0)*0.52, xm=x0+(x1-x0)*0.6; return `M ${x0} ${y0} C ${x0} ${ym} ${xm} ${y1} ${x1} ${y1}`; }
function vcurve(x1,y1,x2,y2){ const my=(y1+y2)/2; return `M ${x1} ${y1} C ${x1} ${my} ${x2} ${my} ${x2} ${y2}`; }

/* a nerve = soft glow halo + bright core, optionally with a travelling signal */
function nerve(d,col,coreW,glowW,signal,dur){
  let s=`<path d="${d}" stroke="${col}" stroke-width="${glowW}" stroke-opacity=".16" fill="none" filter="url(#glow)" stroke-linecap="round"/>`+
        `<path d="${d}" stroke="${col}" stroke-width="${coreW}" stroke-opacity=".9" fill="none" stroke-linecap="round"/>`;
  if(signal) s+=`<circle r="2.6" fill="#fff" filter="url(#soft)"><animateMotion dur="${dur}s" repeatCount="indefinite" path="${d}"/></circle>`;
  return s;
}
function matchFilter(pr,f){ if(f==="all")return true; if(f==="next")return !!pr.next; return pr.status===f; }

function buildSVG(filter){
  filter=filter||"all";
  const place=layout();
  const S=[];
  S.push(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">`);
  S.push(`<defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%">
      <stop offset="0%" stop-color="#0c1420"/><stop offset="100%" stop-color="#06090e"/></radialGradient>
    <filter id="glow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="soft" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>`);
  S.push(`<rect width="${W}" height="${H}" fill="url(#bg)"/>`);

  // faint background neural filaments
  for(let i=0;i<22;i++){
    const fx=((i*137)%W), fy=((i*89)%H), a=Math.sin(i)*60;
    S.push(`<path d="M ${fx} ${fy} q ${a} ${40} ${a*1.4} ${90}" stroke="#13202e" stroke-width="1" fill="none" opacity=".5"/>`);
    S.push(`<circle cx="${fx}" cy="${fy}" r="1.3" fill="#1b2a3a"/>`);
  }

  // ── central nerve cord (spinal) ──
  const sp=spinePath();
  S.push(nerve(sp, CORD, 3, 13, true, 5));
  S.push(nerve(sp, CORD, 1.2, 0, false));

  // ── root nerves fanning out at the base ──
  const rn=DATA.roots.length;
  DATA.roots.forEach((r,i)=>{
    const dir=(i-(rn-1)/2), rx=cx+dir*170, ry=baseY+62;
    const d=vcurve(cx, baseY+4, rx, ry);
    S.push(nerve(d, CORD, 1.6, 6, false));
    S.push(`<circle cx="${rx}" cy="${ry}" r="4" fill="#0a121b" stroke="${CORD}" stroke-width="1.6"/>`);
    S.push(`<text x="${rx}" y="${ry+17}" text-anchor="middle" class="leaf" font-size="10">${esc(r)}</text>`);
  });

  // ── pillar nerves + ganglia + synapses ──
  place.forEach((pl,idx)=>{
    const p=pl.p, col=p.color;
    const attachY=Math.min(pl.y+150, baseY-26);
    const ax=spineX(attachY)+(pl.side==="L"?-5:5);
    const visible=p.projects.some(pr=>matchFilter(pr,filter));
    const outer=pl.side==="L"?-1:1;
    const anchor=pl.side==="L"?"end":"start";
    const leadEnd=pl.x+outer*170;
    const dur=(3.5+idx*0.6).toFixed(1);

    // main axon (cord → ganglion) with travelling signal, + lead to the title
    S.push(`<g class="branch${visible?"":" dim"}" data-i="${idx}">`);
    S.push(nerve(elbow(ax,attachY,pl.x,pl.y), col, 2.2, 9, visible, dur));
    S.push(nerve(`M ${pl.x} ${pl.y} L ${leadEnd} ${pl.y}`, col, 2, 7, false));
    S.push(`</g>`);

    // synapses (projects) — finer nerves hanging off the axon
    p.projects.forEach((pr,j)=>{
      const sx=pl.x+outer*(34+j*52), oy=pl.y+38+j*30;
      const pcol=projColor(pr);
      const vis=matchFilter(pr,filter);
      S.push(`<g${vis?"":' class="dim"'}>`+nerve(vcurve(sx, pl.y+3, sx, oy), col, 1.3, 4, false)+`</g>`);
      S.push(`<g class="opt"${vis?"":' opacity=".13"'} data-i="${idx}" data-j="${j}">`);
      if(pr.next) S.push(`<circle class="pulse" cx="${sx}" cy="${oy}" r="8" fill="none" stroke="${STATUS.active}" stroke-width="2"/>`);
      S.push(`<circle cx="${sx}" cy="${oy}" r="9" fill="${pcol}" opacity=".22" filter="url(#glow)"/>`);
      S.push(`<circle cx="${sx}" cy="${oy}" r="4.5" fill="${pcol}"/>`);
      const lx=sx+outer*12;
      S.push(`<text x="${lx}" y="${oy-2}" text-anchor="${anchor}" class="pname" font-size="11.5">${esc(pr.name)}</text>`);
      const sub=pr.files.length?pr.files.join(", "):(pr.status==="idea"?"→ next step":"no files yet");
      S.push(`<text x="${lx}" y="${oy+11}" text-anchor="${anchor}" class="leaf" font-size="9.5">${esc(sub)}</text>`);
      S.push(`</g>`);
    });

    // ganglion (pillar neuron) + title
    const tx=leadEnd+outer*14;
    S.push(`<g class="branch" data-i="${idx}"${visible?"":' opacity=".22"'}>`);
    const icoX=pl.side==="L"? tx-22 : tx;
    S.push(`<g transform="translate(${icoX},${pl.y-56}) scale(.9)" fill="none" stroke="${col}" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="${ICONS[p.icon]||ICONS.box}"/></g>`);
    S.push(`<text x="${tx}" y="${pl.y-24}" text-anchor="${anchor}" class="ttl" fill="${col}" font-size="15">${esc(p.name.toUpperCase())}</text>`);
    wrap(p.blurb,30).forEach((ln,k)=>S.push(`<text x="${tx}" y="${pl.y-7+k*13}" text-anchor="${anchor}" class="blurb" font-size="10.5">${esc(ln)}</text>`));
    // soma
    S.push(`<circle cx="${pl.x}" cy="${pl.y}" r="20" fill="${col}" opacity=".25" filter="url(#glow)"/>`);
    // tiny dendrite filaments
    for(let a=0;a<5;a++){ const ang=a/5*6.283+idx; const ex=pl.x+Math.cos(ang)*26, ey=pl.y+Math.sin(ang)*26;
      S.push(`<line x1="${pl.x}" y1="${pl.y}" x2="${ex.toFixed(0)}" y2="${ey.toFixed(0)}" stroke="${col}" stroke-width="1.2" stroke-opacity=".5"/>`);
      S.push(`<circle cx="${ex.toFixed(0)}" cy="${ey.toFixed(0)}" r="1.6" fill="${col}" opacity=".7"/>`); }
    S.push(`<circle cx="${pl.x}" cy="${pl.y}" r="14" fill="${col}"/>`);
    S.push(`<circle cx="${pl.x}" cy="${pl.y}" r="14" fill="none" stroke="#06121a" stroke-width="2"/>`);
    S.push(`<text x="${pl.x}" y="${pl.y+5}" text-anchor="middle" class="pin-num" font-size="14">${p.n}</text>`);
    S.push(`</g>`);
  });

  // ── 17BA brain (root ganglion) ──
  S.push(`<circle cx="${cx}" cy="${baseY}" r="34" fill="#ff5a5a" opacity=".22" filter="url(#glow)"/>`);
  S.push(`<circle cx="${cx}" cy="${baseY}" r="16" fill="#0a0e15" stroke="#ff5a5a" stroke-width="2.5"/>`);
  S.push(`<circle cx="${cx}" cy="${baseY}" r="6" fill="#ff5a5a"/>`);
  S.push(`<text x="${cx}" y="${baseY+46}" text-anchor="middle" fill="#ff7a7a" font-size="15" font-weight="800" letter-spacing="1.5">${esc(DATA.core.name)}</text>`);

  S.push(`</svg>`);
  return S.join("");
}

function wrap(s,max){
  const words=String(s).split(" "); const lines=[]; let cur="";
  for(const w of words){ if((cur+" "+w).trim().length>max){ lines.push(cur.trim()); cur=w; } else cur+=" "+w; }
  if(cur.trim()) lines.push(cur.trim()); return lines.slice(0,2);
}

/* ── Node export for verification / browser init ── */
if (typeof module!=="undefined" && module.exports){ module.exports={buildSVG,DATA,layout}; }

if (typeof document!=="undefined"){
  let curFilter="all";
  function render(){
    document.getElementById("stage").innerHTML=buildSVG(curFilter);
    wire();
    const nx=DATA.pillars.flatMap(p=>p.projects).find(x=>x.next);
    document.getElementById("subline").textContent = nx?("FIRING NEXT → "+nx.name.toUpperCase()):"BAD APPLE ENTERPRISE · CENTRAL NERVOUS SYSTEM";
  }
  function wire(){
    document.querySelectorAll(".branch").forEach(el=>{
      el.addEventListener("click",()=>openPillar(+el.dataset.i));
      el.addEventListener("mouseenter",()=>highlight(+el.dataset.i));
      el.addEventListener("mouseleave",()=>render());
    });
    document.querySelectorAll(".opt").forEach(el=>el.addEventListener("click",e=>{e.stopPropagation();openProject(+el.dataset.i,+el.dataset.j);}));
  }
  function highlight(i){ document.querySelectorAll(".branch").forEach(b=>{ if(+b.dataset.i!==i) b.classList.add("dim"); }); }
  function openPillar(i){
    const pil=layout()[i].p;
    let h=`<div class="pp-pillar" style="color:${pil.color}">NERVE ${pil.n} · ${esc(pil.name.toUpperCase())}</div>`;
    h+=`<h2>${esc(pil.name)}</h2><div class="row" style="margin-top:4px">${esc(pil.blurb)}</div><div class="files" style="margin-top:14px">`;
    pil.projects.forEach(pr=>{ h+=`<div class="f"><i style="width:9px;height:9px;border-radius:50%;display:inline-block;background:${projColor(pr)}"></i>`+
      `<b style="color:#dfe5ee">${esc(pr.name)}</b> <span style="color:#69748a">· ${esc(STATUS_LABEL[pr.status]||pr.status)}${pr.next?" · NEXT":""}</span></div>`; });
    h+=`</div>`; showPanel(h);
  }
  function openProject(i,j){
    const pil=layout()[i].p, pr=pil.projects[j];
    let h=`<div class="pp-pillar" style="color:${pil.color}">${esc(pil.name.toUpperCase())}</div><h2>${esc(pr.name)}</h2>`;
    h+=`<div class="stat" style="background:${projColor(pr)}1f;color:${projColor(pr)}"><span style="width:8px;height:8px;border-radius:50%;background:${projColor(pr)};display:inline-block"></span>${esc(STATUS_LABEL[pr.status]||pr.status)}${pr.next?" · firing next":""}</div>`;
    h+=`<div class="row">Agent: <b>${esc(pr.agent||"—")}</b></div><div class="row" style="display:block">Files:`;
    if(pr.files.length) h+=`<div class="files">`+pr.files.map(f=>`<div class="f">📄 ${esc(f)}</div>`).join("")+`</div>`;
    else h+=`<div class="empty">No synapse yet — this nerve hasn't fired.</div>`;
    h+=`</div>`; if(pr.note) h+=`<div class="nextnote"><b>Next step:</b> ${esc(pr.note)}</div>`;
    showPanel(h);
  }
  function showPanel(html){ document.getElementById("panelBody").innerHTML=html; document.getElementById("panel").classList.add("open"); }
  window.closePanel=()=>document.getElementById("panel").classList.remove("open");
  document.querySelectorAll(".chip").forEach(c=>c.addEventListener("click",()=>{
    document.querySelectorAll(".chip").forEach(x=>x.classList.remove("on")); c.classList.add("on"); curFilter=c.dataset.f; render();
  }));
  render();
}
</script>
</body>
</html>
